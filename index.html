<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>가계부(뱅&찌)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #5b8def;
    --accent2: #e05c7a;
    --green: #3dd68c;
    --yellow: #f5c842;
    --text: #e8eaf0;
    --muted: #7a82a0;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'DM Mono', monospace;
    --tab-h: 68px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); }

  /* App Shell */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* Top Header */
  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; z-index: 10;
  }
  .top-bar-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .top-bar-title span { color: var(--accent); }
  .top-bar-month { font-size: 13px; color: var(--muted); font-weight: 500; }
  .top-bar-subtitle { position: absolute; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; opacity: 0.6; white-space: nowrap; }
  .top-bar { position: relative; }

  /* Scroll Area */
  .scroll-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px);
    -webkit-overflow-scrolling: touch;
  }

  /* Pages */
  .page { display: none; padding: 16px; position: relative; z-index: 1; }
  .page.active { display: block; }

  /* Summary cards */
  .cards-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 12px;
  }
  .card-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .card-value { font-size: 15px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.5px; word-break: break-all; }
  .card-value.income { color: var(--green); }
  .card-value.expense { color: var(--accent2); }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: 16px;
    padding: 32px 20px; text-align: center; cursor: pointer;
    background: var(--surface); position: relative; overflow: hidden;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  .upload-zone.drag { border-color: var(--accent); background: #5b8def0a; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-title { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .upload-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* Camera button */
  .cam-btn {
    width: 100%; padding: 14px; border-radius: 14px;
    background: var(--accent); color: #fff; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; font-family: var(--font);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 14px;
  }

  /* AI result card */
  .ai-result {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px; display: none; margin-bottom: 14px;
  }
  .ai-result.show { display: block; }
  .ai-result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-weight: 700; font-size: 15px; }
  .ai-badge { background: var(--accent)22; color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* Preview image */
  .preview-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 10px; margin-bottom: 14px; border: 1px solid var(--border); }

  /* Crop overlay */
  #crop-overlay {
    display: none; position: fixed; inset: 0; background: #000000ee;
    z-index: 300; flex-direction: column; align-items: center; justify-content: center;
  }
  #crop-overlay.show { display: flex; }
  #crop-container {
    position: relative; touch-action: none; user-select: none;
    max-width: 100vw; max-height: 70vh;
  }
  #crop-img { display: block; max-width: 100vw; max-height: 70vh; object-fit: contain; }
  #crop-box {
    position: absolute; border: 2px solid #fff;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    cursor: move; touch-action: none;
  }
  .crop-handle {
    position: absolute; width: 22px; height: 22px;
    background: #fff; border-radius: 3px; touch-action: none;
  }
  .crop-handle.tl { top: -6px; left: -6px; cursor: nw-resize; }
  .crop-handle.tr { top: -6px; right: -6px; cursor: ne-resize; }
  .crop-handle.bl { bottom: -6px; left: -6px; cursor: sw-resize; }
  .crop-handle.br { bottom: -6px; right: -6px; cursor: se-resize; }
  .crop-actions {
    display: flex; gap: 12px; margin-top: 20px;
  }
  .crop-btn {
    padding: 12px 28px; border-radius: 12px; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; font-family: var(--font);
  }

  /* Form */
  .form-group { margin-bottom: 12px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 5px; }
  input, select, textarea {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px 13px; font-size: 15px; font-family: var(--font);
    transition: border-color 0.15s; outline: none; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }

  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .type-btn {
    padding: 11px; text-align: center; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; background: var(--bg); color: var(--muted);
    font-family: var(--font); transition: all 0.15s;
  }
  .type-btn.active-income { background: var(--green)22; color: var(--green); }
  .type-btn.active-expense { background: var(--accent2)22; color: var(--accent2); }

  .btn-full {
    width: 100%; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 700;
    cursor: pointer; border: none; font-family: var(--font); margin-top: 4px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  /* Loader */
  .loader { display: none; align-items: center; justify-content: center; gap: 10px; padding: 20px; color: var(--muted); font-size: 13px; }
  .loader.show { display: flex; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* List page */
  .filter-scroll { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 4px; scrollbar-width: none; }
  .filter-scroll::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .entry-list { display: flex; flex-direction: column; gap: 8px; }
  .entry-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px;
  }
  .entry-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-merchant { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-family: var(--mono); font-size: 15px; font-weight: 600; text-align: right; flex-shrink: 0; }
  .entry-amount.income { color: var(--green); }
  .entry-amount.expense { color: var(--accent2); }
  .entry-date-group { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }

  /* Swipe delete */
  .entry-card { position: relative; overflow: hidden; min-height: 64px; }
  .delete-btn {
    position: absolute; right: 0; top: 0; bottom: 0; width: 72px;
    background: var(--accent2); color: #fff; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700; font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
    transform: translateX(100%); transition: transform 0.2s;
  }
  .entry-card.swiped .delete-btn { transform: translateX(0); }
  .entry-card.swiped .entry-content { transform: translateX(-72px); }
  .entry-content { transition: transform 0.2s; display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px 16px; }

  /* Summary page */
  .month-scroll { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
  .month-scroll::-webkit-scrollbar { display: none; }
  .month-chip {
    flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer;
  }
  .month-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
  .bar-group { display: flex; flex-direction: column; gap: 12px; }
  .bar-item { display: flex; flex-direction: column; gap: 5px; }
  .bar-top { display: flex; justify-content: space-between; }
  .bar-label { font-size: 13px; font-weight: 500; }
  .bar-amount { font-size: 13px; font-family: var(--mono); color: var(--text); }
  .bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s ease; }

  .donut-row { display: flex; align-items: center; gap: 16px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Bottom Tab Bar */
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding-bottom: var(--safe-bottom);
    z-index: 500;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; cursor: pointer; border: none; background: none; color: var(--muted);
    font-family: var(--font); font-size: 10px; font-weight: 600; transition: color 0.15s;
    padding: 8px 4px; -webkit-tap-highlight-color: rgba(91,141,239,0.15);
  }
  .tab-item.active { color: var(--accent); }
  .tab-icon { font-size: 22px; line-height: 1; }

  /* Toast */
  .toast {
    position: fixed; top: calc(60px + env(safe-area-inset-top, 0px)); left: 50%; transform: translateX(-50%) translateY(-10px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 18px; font-size: 13px; font-weight: 600;
    white-space: nowrap; opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.8; }

  /* Search input */
  .search-input-wrap { position: relative; margin-bottom: 12px; }
  .search-input-wrap input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
</style>
</head>
<body>
<div class="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-title">가계부<span>(뱅&찌)</span></div>
    <div class="top-bar-subtitle">너의 분수를 알라</div>
    <button class="top-bar-month" id="top-month" onclick="openMonthPicker()" style="background:none;border:1px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:var(--font);color:var(--text);font-size:13px;font-weight:500;white-space:nowrap">2026년 3월 <span style="font-size:10px;opacity:0.6">▼</span></button>
    <!-- Month Picker Overlay -->
    <div id="month-overlay" style="display:none;position:fixed;inset:0;background:#00000088;z-index:600;align-items:flex-end" onclick="if(event.target===this)closeMonthPicker()">
      <div style="background:var(--surface);border-radius:20px 20px 0 0;width:100%;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));max-height:75vh;overflow-y:auto;-webkit-overflow-scrolling:touch">
        <div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;"></div>
        <div style="font-size:15px;font-weight:700;margin-bottom:16px;text-align:center">월 선택</div>
        <div id="month-picker-list" style="display:flex;flex-direction:column;gap:8px;padding-bottom:8px"></div>
      </div>
    </div>
  </div>

  <!-- Scroll Content -->
  <div class="scroll-area" style="position:relative">


    <!-- Page: AI Upload -->
    <div class="page active" id="page-upload">
      <div class="cards-row">
        <div class="card"><div class="card-label">수입</div><div class="card-value income" id="stat-income">₩0</div></div>
        <div class="card"><div class="card-label">지출</div><div class="card-value expense" id="stat-expense">₩0</div></div>
        <div class="card"><div class="card-label">잔액</div><div class="card-value" id="stat-balance">₩0</div></div>
      </div>

      <!-- Upload -->
      <input type="file" accept="image/*" id="img-input" style="display:none" onchange="handleFileSelect(event)">

      <div class="upload-zone" id="dropzone" onclick="document.getElementById('img-input').click()">
        <div class="upload-icon">🧾</div>
        <div class="upload-title">이미지 파일 선택</div>
        <div class="upload-sub">갤러리에서 선택하거나<br>파일을 끌어다 놓으세요</div>
      </div>

      <div class="loader" id="ai-loader"><div class="spinner"></div> AI가 분석하는 중...</div>

      <div class="ai-result" id="ai-result">
        <div id="ai-debug-wrap" style="display:none;margin-bottom:10px">
          <div style="font-size:10px;color:var(--yellow);font-weight:600;margin-bottom:4px">🔍 AI 응답 미리보기 (디버그)</div>
          <div id="ai-debug" style="font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;word-break:break-all;white-space:pre-wrap;max-height:80px;overflow-y:auto"></div>
          <button onclick="document.getElementById('ai-debug-wrap').style.display='none'" style="font-size:10px;color:var(--muted);background:none;border:none;margin-top:4px;cursor:pointer">닫기</button>
        </div>
        <div class="ai-result-header"><span>AI 분석 결과</span><span class="ai-badge">AI</span><span id="ai-count" style="font-size:12px;color:var(--muted);font-weight:500;margin-left:auto"></span></div>
        <img id="preview-img" class="preview-img" src="" alt="">
        <div id="ai-items-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px"></div>
        <button class="btn-full btn-primary" onclick="saveAllEntries()">✅ 전체 저장하기</button>
        <button class="btn-full btn-secondary" style="margin-top:8px" onclick="cancelAI()">취소</button>
      </div>
    </div>

    <!-- Page: Manual -->
    <div class="page" id="page-manual">
      <div class="form-group">
        <label>유형</label>
        <div class="type-toggle">
          <button class="type-btn active-expense" id="m-btn-expense" onclick="setMType('expense')">💸 지출</button>
          <button class="type-btn" id="m-btn-income" onclick="setMType('income')">💰 수입</button>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label>날짜</label>
          <input type="date" id="m-date">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>금액 (원)</label>
          <input type="number" id="m-amount" placeholder="0" inputmode="numeric">
        </div>
      </div>

      <div class="form-group">
        <label>상호명 / 내용</label>
        <input type="text" id="m-merchant" placeholder="예: 스타벅스, 월급">
      </div>

      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label>카테고리</label>
          <select id="m-category">
            <option>식비</option><option>카페/음료</option><option>교통</option>
            <option>쇼핑</option><option>의료/건강</option><option>문화/여가</option>
            <option>통신</option><option>공과금</option><option>급여</option>
            <option>기타수입</option><option>기타</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>결제수단</label>
          <select id="m-payment">
            <option>카드</option><option>현금</option><option>계좌이체</option><option>기타</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>메모</label>
        <input type="text" id="m-memo" placeholder="메모 (선택)">
      </div>

      <button class="btn-full btn-primary" onclick="saveManual()">➕ 추가하기</button>
    </div>

    <!-- Page: List -->
    <div class="page" id="page-list">
      <!-- 일반 모드 헤더 -->
      <div id="list-header-normal">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="filter-search" placeholder="검색..." oninput="renderList()">
          <button onclick="enterSelectMode()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;padding:4px 8px;font-family:var(--font)">선택</button>
        </div>
        <div class="filter-scroll" id="filter-scroll">
          <button class="filter-chip active" onclick="setMonthFilter(this, '')">전체</button>
        </div>
        <div class="filter-scroll">
          <button class="filter-chip active" data-type="" onclick="setTypeFilter(this, '')">전체</button>
          <button class="filter-chip" data-type="income" onclick="setTypeFilter(this, 'income')">💰 수입</button>
          <button class="filter-chip" data-type="expense" onclick="setTypeFilter(this, 'expense')">💸 지출</button>
        </div>
      </div>
      <!-- 선택 모드 헤더 -->
      <div id="list-header-select" style="display:none;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <button onclick="toggleSelectAll()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)" id="select-all-btn">전체선택</button>
          <span id="select-count" style="font-size:13px;color:var(--muted);font-weight:600">0개 선택됨</span>
          <button onclick="exitSelectMode()" style="background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)">취소</button>
        </div>
        <button id="delete-selected-btn" onclick="deleteSelected()" style="width:100%;padding:13px;background:#e05c7a22;border:1px solid var(--accent2);border-radius:12px;color:var(--accent2);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:none">🗑️ 선택 항목 삭제</button>
      </div>
      <div class="entry-list" id="entry-list"></div>

function initCropBox() {
  const img = document.getElementById('crop-img');
  const box = document.getElementById('crop-box');
  const iw = img.offsetWidth, ih = img.offsetHeight;
  // Default: 80% of image centered
  const bw = Math.round(iw * 0.85), bh = Math.round(ih * 0.85);
  const bx = Math.round((iw - bw) / 2), by = Math.round((ih - bh) / 2);
  box.style.left = bx + 'px'; box.style.top = by + 'px';
  box.style.width = bw + 'px'; box.style.height = bh + 'px';
  setupCropDrag();
}

function setupCropDrag() {
  const box = document.getElementById('crop-box');
  const container = document.getElementById('crop-container');
  let dragging = false, resizing = null;
  let startX, startY, startL, startT, startW, startH;

  function getPos(e) {
    const t = e.touches ? e.touches[0] : e;
    const rect = container.getBoundingClientRect();
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function onStart(e) {
    if (e.target.dataset.handle) {
      resizing = e.target.dataset.handle;
    } else if (e.target === box) {
      dragging = true;
    } else return;
    e.preventDefault();
    const p = getPos(e);
    startX = p.x; startY = p.y;
    startL = parseInt(box.style.left); startT = parseInt(box.style.top);
    startW = parseInt(box.style.width); startH = parseInt(box.style.height);
  }

  function onMove(e) {
    if (!dragging && !resizing) return;
    e.preventDefault();
    const p = getPos(e);
    const dx = p.x - startX, dy = p.y - startY;
    const img = document.getElementById('crop-img');
    const maxW = img.offsetWidth, maxH = img.offsetHeight;
    const minSize = 40;

    if (dragging) {
      let nl = Math.max(0, Math.min(startL + dx, maxW - startW));
      let nt = Math.max(0, Math.min(startT + dy, maxH - startH));
      box.style.left = nl + 'px'; box.style.top = nt + 'px';
    } else {
      let l = startL, t = startT, w = startW, h = startH;
      if (resizing.includes('r')) w = Math.max(minSize, Math.min(startW + dx, maxW - startL));
      if (resizing.includes('b')) h = Math.max(minSize, Math.min(startH + dy, maxH - startT));
      if (resizing.includes('l')) { const nw = Math.max(minSize, startW - dx); l = startL + (startW - nw); w = nw; }
      if (resizing.includes('t')) { const nh = Math.max(minSize, startH - dy); t = startT + (startH - nh); h = nh; }
      box.style.left = Math.max(0,l) + 'px'; box.style.top = Math.max(0,t) + 'px';
      box.style.width = w + 'px'; box.style.height = h + 'px';
    }
  }

  function onEnd() { dragging = false; resizing = null; }

  box.addEventListener('mousedown', onStart);
  box.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function confirmCrop() {
  const img = document.getElementById('crop-img');
  const box = document.getElementById('crop-box');
  const scaleX = img.naturalWidth / img.offsetWidth;
  const scaleY = img.naturalHeight / img.offsetHeight;
  const x = parseInt(box.style.left) * scaleX;
  const y = parseInt(box.style.top) * scaleY;
  const w = parseInt(box.style.width) * scaleX;
  const h = parseInt(box.style.height) * scaleY;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const fullImg = new Image();
  fullImg.onload = () => {
    ctx.drawImage(fullImg, x, y, w, h, 0, 0, w, h);
    cropOriginalUrl = canvas.toDataURL('image/jpeg', 0.9);
    cancelCrop();
    processImageFromUrl(cropOriginalUrl);
  };
  fullImg.src = cropOriginalUrl;
}

function compressImage(dataUrl, maxWidth=1600, quality=0.85) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxWidth / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      // Draw image
      ctx.drawImage(img, 0, 0, w, h);
      // Enhance: brighten dark images and boost contrast
      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;
      // Calculate average brightness
      let sum = 0;
      for (let i = 0; i < data.length; i += 4) sum += (data[i] + data[i+1] + data[i+2]) / 3;
      const avg = sum / (data.length / 4);
      // If dark image (avg < 100), brighten it
      const brighten = avg < 100 ? (140 - avg) / 255 * 1.5 : 0;
      const contrast = avg < 100 ? 1.4 : 1.1;
      const factor = contrast;
      const intercept = 128 * (1 - factor) + brighten * 255;
      for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.min(255, Math.max(0, data[i]   * factor + intercept));
        data[i+1] = Math.min(255, Math.max(0, data[i+1] * factor + intercept));
        data[i+2] = Math.min(255, Math.max(0, data[i+2] * factor + intercept));
      }
      ctx.putImageData(imageData, 0, 0);
      const compressed = canvas.toDataURL('image/jpeg', quality);
      resolve({ dataUrl: compressed, mimeType: 'image/jpeg' });
    };
    img.src = dataUrl;
  });
}

function processImage(file) {

            role: 'user',

              { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },

이미지에 보이는 모든 거래 내역을 추출하고, 각 필드마다 확인 여부를 표시해서 아래 형식의 순수 JSON 배열로만 응답하세요. 설명/마크다운/코드블록 없이 [ 로 시작하는 JSON만:

[{"date":"YYYY-MM-DD","date_ok":true,"merchant":"상호명","merchant_ok":true,"amount":숫자,"amount_ok":true,"type":"expense또는income","type_ok":true,"category":"카테고리","category_ok":true,"payment":"결제수단","memo":""}]

필드별 _ok 규칙 (이미지에서 명확히 읽혔으면 true, 추정/불확실하면 false):

기타 규칙:

- 날짜 없으면 오늘(${today()}) + date_ok:false
- 금액은 숫자만 (콤마/원 제거)
- 취소/환불 제외
- 상호명은 실제 가게명만 (앱이름/카드사 제거)` }
            ]
          }]
        })
      });
      const data = await res.json();
      text = data.content?.find(b=>b.type==='text')?.text || '';
      // Show raw response for debugging
      document.getElementById('ai-debug').textContent = text.slice(0, 500);
      document.getElementById('ai-debug-wrap').style.display = 'block';
      // Try to extract JSON array or object from response
      let clean = text.replace(/```json|```/g,'').trim();
      // Find JSON array or object - be more aggressive
      const arrMatch = clean.match(/\[[\s\S]*?\]/s);
      const objMatch = clean.match(/\{[\s\S]*?\}/s);
      if (arrMatch) clean = arrMatch[0];
      else if (objMatch) clean = '[' + objMatch[0] + ']';
      let parsed = JSON.parse(clean);
      if (!Array.isArray(parsed)) parsed = [parsed];
      // Accept all items, mark missing fields for manual review
      const rawItems = parsed.filter(p => p && typeof p === 'object');
      pendingItems = rawItems.map((p,i) => ({
        id: i,
        date: p.date || today(),
        date_ok: p.date_ok !== false,
        merchant: p.merchant || '',
        merchant_ok: !!(p.merchant && p.merchant.trim() && p.merchant_ok !== false),
        amount: parseFloat(p.amount) || 0,
        amount_ok: !!(parseFloat(p.amount) > 0 && p.amount_ok !== false),
        type: p.type || 'expense',
        type_ok: p.type_ok !== false,
        category: CAT_MAP[p.category] || p.category || '기타',
        category_ok: p.category_ok !== false,
        payment: p.payment || '카드',
        memo: p.memo || '',
        checked: true
      }));
      renderAIItems();
    } catch(err) {
      console.error('AI error:', err, 'raw response:', text);
      // Show AI result panel with empty state so user can add manually
      pendingItems = [];
      renderAIItems();
      showToast('⚠️ 자동 인식 실패 - 직접 입력해주세요', 'error');
    }
    document.getElementById('ai-loader').classList.remove('show');
    document.getElementById('ai-result').classList.add('show');
  }
}

function updateItemBorder(i) {
  const item = pendingItems[i];
  const cards = document.getElementById('ai-items-list').children;
  if (cards[i]) {
    cards[i].style.border = '1px solid ' + (needsReview(item) ? 'var(--yellow)' : 'var(--border)');
  }
  // Update count text
  const needsCount = pendingItems.filter(needsReview).length;
  document.getElementById('ai-count').textContent = pendingItems.length + '건 인식됨' + (needsCount > 0 ? ' · ⚠️ ' + needsCount + '건 확인 필요' : ' · ✅ 모두 확인됨');
}

function needsReview(item) {
  return !item.date_ok || !item.merchant_ok || !item.amount_ok || !item.type_ok || !item.category_ok;
}

function fieldStyle(ok) {
  return 'font-size:11px;padding:6px;border-radius:8px;color:var(--text);width:100%;' +
    (ok ? 'background:var(--surface2);border:1px solid var(--border);'
        : 'background:#f5c84218;border:2px solid var(--yellow);');
}

function renderAIItems() {
  const list = document.getElementById('ai-items-list');
  const count = document.getElementById('ai-count');
  const needsCount = pendingItems.filter(needsReview).length;
  count.textContent = pendingItems.length + '건 인식됨' + (needsCount > 0 ? ' · ⚠️ ' + needsCount + '건 확인 필요' : ' · ✅ 모두 확인됨');
  list.innerHTML = '';

  pendingItems.forEach((item, i) => {
    const amtColor = item.type === 'income' ? 'var(--green)' : 'var(--accent2)';
    const hasIssue = needsReview(item);
    const catOptions = CATS.map(c => '<option value="' + c + '"' + (item.category === c ? ' selected' : '') + '>' + c + '</option>').join('');
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--bg);border:1px solid ' + (hasIssue ? 'var(--yellow)' : 'var(--border)') + ';border-radius:12px;padding:12px 14px;';

    div.innerHTML =
      // Row 1: checkbox + merchant + amount
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
        '<input type="checkbox" id="chk-' + i + '" ' + (item.checked ? 'checked' : '') + ' onchange="pendingItems[' + i + '].checked=this.checked" style="width:18px;height:18px;accent-color:var(--accent);flex-shrink:0">' +
        '<div style="flex:1;position:relative">' +
          (!item.merchant_ok ? '<span style="position:absolute;top:-7px;left:6px;font-size:9px;color:var(--yellow);font-weight:700;background:var(--bg);padding:0 3px">⚠️ 확인필요</span>' : '') +
          '<input type="text" value="' + item.merchant + '" onchange="pendingItems[' + i + '].merchant=this.value;pendingItems[' + i + '].merchant_ok=true;updateItemBorder(' + i + ')" style="' + fieldStyle(item.merchant_ok) + 'font-weight:600;font-size:13px">' +
        '</div>' +
        '<div style="position:relative;flex-shrink:0">' +
          (!item.amount_ok ? '<span style="position:absolute;top:-7px;right:0;font-size:9px;color:var(--yellow);font-weight:700;background:var(--bg);padding:0 3px">⚠️</span>' : '') +
          '<input type="number" value="' + item.amount + '" onchange="pendingItems[' + i + '].amount=parseFloat(this.value)||0;pendingItems[' + i + '].amount_ok=true;updateItemBorder(' + i + ')" style="' + fieldStyle(item.amount_ok) + 'width:100px;text-align:right;font-family:var(--mono);color:' + amtColor + '">' +
        '</div>' +
      '</div>' +
      // Row 2: date + category + type
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">' +
        '<div style="position:relative">' +
          (!item.date_ok ? '<span style="position:absolute;top:-7px;left:6px;font-size:9px;color:var(--yellow);font-weight:700;background:var(--bg);padding:0 3px;z-index:1">⚠️날짜</span>' : '') +
          '<input type="date" value="' + item.date + '" onchange="pendingItems[' + i + '].date=this.value;pendingItems[' + i + '].date_ok=true;updateItemBorder(' + i + ')" style="' + fieldStyle(item.date_ok) + '">' +
        '</div>' +
        '<div style="position:relative">' +
          (!item.category_ok ? '<span style="position:absolute;top:-7px;left:6px;font-size:9px;color:var(--yellow);font-weight:700;background:var(--bg);padding:0 3px;z-index:1">⚠️카테고리</span>' : '') +
          '<select onchange="pendingItems[' + i + '].category=this.value;pendingItems[' + i + '].category_ok=true;updateItemBorder(' + i + ')" style="' + fieldStyle(item.category_ok) + '">' + catOptions + '</select>' +
        '</div>' +
        '<div style="position:relative">' +
          (!item.type_ok ? '<span style="position:absolute;top:-7px;left:6px;font-size:9px;color:var(--yellow);font-weight:700;background:var(--bg);padding:0 3px;z-index:1">⚠️유형</span>' : '') +
          '<select onchange="pendingItems[' + i + '].type=this.value;pendingItems[' + i + '].type_ok=true;updateItemBorder(' + i + ')" style="' + fieldStyle(item.type_ok) + '">' +
            '<option value="expense"' + (item.type==='expense'?' selected':'') + '>💸 지출</option>' +
            '<option value="income"' + (item.type==='income'?' selected':'') + '>💰 수입</option>' +
          '</select>' +
        '</div>' +
      '</div>';

    list.appendChild(div);
  });
}

// ---- List ----
function buildMonthFilters() {
  const months = [...new Set(entries.map(e=>e.date.slice(0,7)))].sort().reverse();
  const wrap = document.getElementById('filter-scroll');
  wrap.innerHTML = `<button class="filter-chip ${filterMonth===''?'active':''}" onclick="setMonthFilter(this,'')">전체</button>`;
  months.slice(0,12).forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (filterMonth===m?' active':'');
    btn.textContent = korMonth(m);
    btn.onclick = () => setMonthFilter(btn, m);
    wrap.appendChild(btn);
  });
}

function setMonthFilter(el, val) {
  document.querySelectorAll('#filter-scroll .filter-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); filterMonth = val; renderList();
}
function setTypeFilter(el, val) {
  el.closest('.filter-scroll').querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); filterType = val; renderList();
}

let selectMode = false;
let selectedIds = new Set();

function enterSelectMode() {
  selectMode = true;
  selectedIds.clear();
  document.getElementById('list-header-normal').style.display = 'none';
  document.getElementById('list-header-select').style.display = 'block';
  renderList();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.getElementById('list-header-normal').style.display = 'block';
  document.getElementById('list-header-select').style.display = 'none';
  renderList();
}

function toggleSelectAll() {
  const search = document.getElementById('filter-search').value.toLowerCase();
  const filtered = entries.filter(e => {
    if (filterMonth && !e.date.startsWith(filterMonth)) return false;
    if (filterType && e.type !== filterType) return false;
    if (search && !e.merchant.toLowerCase().includes(search) && !(e.memo||'').toLowerCase().includes(search)) return false;
    return true;
  });
  const allSelected = filtered.every(e => selectedIds.has(e.id));
  if (allSelected) selectedIds.clear();
  else filtered.forEach(e => selectedIds.add(e.id));
  updateSelectUI();
  renderList();
}

function updateSelectUI() {
  const count = selectedIds.size;
  document.getElementById('select-count').textContent = count + '개 선택됨';
  document.getElementById('delete-selected-btn').style.display = count > 0 ? 'block' : 'none';
  document.getElementById('delete-selected-btn').textContent = '🗑️ ' + count + '개 삭제하기';
}

function deleteSelected() {
  if (!selectedIds.size) return;
  if (!confirm(selectedIds.size + '개 항목을 삭제할까요?')) return;
  entries = entries.filter(e => !selectedIds.has(e.id));
  save(); buildMonthFilters();
  exitSelectMode();
  showToast('🗑️ ' + selectedIds.size + '개 삭제 완료');
  selectedIds.clear();
}

function renderList() {
  const search = document.getElementById('filter-search').value.toLowerCase();
  let filtered = entries.filter(e => {
    if (filterMonth && !e.date.startsWith(filterMonth)) return false;
    if (filterType && e.type !== filterType) return false;
    if (search && !e.merchant.toLowerCase().includes(search) && !(e.memo||'').toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));

  const list = document.getElementById('entry-list');
  list.innerHTML = '';
  document.getElementById('list-empty').style.display = filtered.length ? 'none' : 'block';

  // Group by date
  const groups = {};
  filtered.forEach(e => { if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });

  Object.keys(groups).sort().reverse().forEach(date => {
    const label = document.createElement('div');
    label.className = 'entry-date-group';
    label.textContent = date;
    list.appendChild(label);
    groups[date].forEach(e => {
      const color = CAT_COLORS[e.category] || '#888';
      const emoji = CAT_EMOJI[e.category] || '📦';
      const card = document.createElement('div');
      card.className = 'entry-card' + (selectMode && selectedIds.has(e.id) ? ' selected-card' : '');
      card.dataset.id = e.id;
      if (selectMode) {
        card.style.border = selectedIds.has(e.id) ? '2px solid var(--accent)' : '1px solid var(--border)';
        card.onclick = () => {
          if (selectedIds.has(e.id)) selectedIds.delete(e.id);
          else selectedIds.add(e.id);
          updateSelectUI();
          renderList();
        };
        card.innerHTML =
          '<div class="entry-content">' +
            '<div style="width:22px;height:22px;border-radius:50%;border:2px solid ' + (selectedIds.has(e.id) ? 'var(--accent)' : 'var(--border)') + ';background:' + (selectedIds.has(e.id) ? 'var(--accent)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px">' + (selectedIds.has(e.id) ? '✓' : '') + '</div>' +
            '<div class="entry-icon" style="background:' + color + '22">' + emoji + '</div>' +
            '<div class="entry-info">' +
              '<div class="entry-merchant">' + e.merchant + '</div>' +
              '<div class="entry-meta">' + e.category + ' · ' + e.payment + (e.memo?' · '+e.memo:'') + '</div>' +
            '</div>' +
            '<div class="entry-amount ' + e.type + '">' + (e.type==='income'?'+':'−') + fmt(e.amount) + '</div>' +
          '</div>';
      } else {
        card.innerHTML =
          '<div class="entry-content">' +
            '<div class="entry-icon" style="background:' + color + '22">' + emoji + '</div>' +
            '<div class="entry-info">' +
              '<div class="entry-merchant">' + e.merchant + '</div>' +
              '<div class="entry-meta">' + e.category + ' · ' + e.payment + (e.memo?' · '+e.memo:'') + '</div>' +
            '</div>' +
            '<div class="entry-amount ' + e.type + '">' + (e.type==='income'?'+':'−') + fmt(e.amount) + '</div>' +
          '</div>' +
          '<button class="delete-btn" onclick="event.stopPropagation();deleteEntry(' + e.id + ')">삭제</button>';
        let startX = 0;
        card.addEventListener('touchstart', ev => { startX = ev.touches[0].clientX; }, {passive:true});
        card.addEventListener('touchend', ev => {
          const dx = ev.changedTouches[0].clientX - startX;
          if (dx < -50) card.classList.add('swiped');
          else if (dx > 30) card.classList.remove('swiped');
        }, {passive:true});
      }
      list.appendChild(card);
    });
  });
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save(); buildMonthFilters(); renderList(); showToast('삭제 완료');
}

// ---- Summary ----
let summaryMode = 'monthly';
let selectedYear = new Date().getFullYear().toString();

function setSummaryMode(mode) {
  summaryMode = mode;
  document.getElementById('view-monthly').style.display = mode==='monthly' ? 'block' : 'none';
  document.getElementById('view-yearly').style.display = mode==='yearly' ? 'block' : 'none';
  document.getElementById('tab-monthly').style.background = mode==='monthly' ? 'var(--accent)' : 'var(--bg)';
  document.getElementById('tab-monthly').style.color = mode==='monthly' ? '#fff' : 'var(--muted)';
  document.getElementById('tab-yearly').style.background = mode==='yearly' ? 'var(--accent)' : 'var(--bg)';
  document.getElementById('tab-yearly').style.color = mode==='yearly' ? '#fff' : 'var(--muted)';
  if (mode==='monthly') renderSummary();
  else renderYearlySummary();
}

function renderSummary() {
  const months = [...new Set(entries.map(e=>e.date.slice(0,7)))].sort().reverse();
  if (!months.includes(selectedSummaryMonth) && months.length) selectedSummaryMonth = months[0];
  if (!months.length) months.push(thisMonth());

  const tabs = document.getElementById('month-tabs');
  tabs.innerHTML = '';
  months.slice(0,12).forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-chip' + (m===selectedSummaryMonth?' active':'');
    btn.textContent = korMonth(m);
    btn.onclick = () => { selectedSummaryMonth = m; renderSummary(); };
    tabs.appendChild(btn);
  });

  const rows = entries.filter(e=>e.date.startsWith(selectedSummaryMonth));
  const inc = rows.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = rows.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('s-income').textContent = fmt(inc);
  document.getElementById('s-expense').textContent = fmt(exp);
  const net = inc - exp;
  const netEl = document.getElementById('s-net');
  netEl.textContent = (net>=0?'':'-') + fmt(net);
  netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--accent2)';

  const catMap = {};
  rows.filter(e=>e.type==='expense').forEach(e => catMap[e.category] = (catMap[e.category]||0) + e.amount);
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted[0]?.[1] || 1;
  document.getElementById('bar-chart').innerHTML = sorted.length
    ? sorted.map(([cat,amt])=>
        '<div class="bar-item">' +
        '<div class="bar-top"><span class="bar-label">' + (CAT_EMOJI[cat]||'📦') + ' ' + cat + '</span><span class="bar-amount">' + fmt(amt) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + (amt/maxVal*100).toFixed(1) + '%;background:' + (CAT_COLORS[cat]||'#888') + '"></div></div>' +
        '</div>').join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0">지출 내역이 없어요</div>';

  renderDonut(sorted, exp);
}

function renderYearlySummary() {
  const years = [...new Set(entries.map(e=>e.date.slice(0,4)))].sort().reverse();
  if (!years.includes(selectedYear) && years.length) selectedYear = years[0];
  if (!years.length) years.push(new Date().getFullYear().toString());

  // Year tabs
  const ytabs = document.getElementById('year-tabs');
  ytabs.innerHTML = '';
  years.forEach(y => {
    const btn = document.createElement('button');
    btn.className = 'month-chip' + (y===selectedYear?' active':'');
    btn.textContent = y + '년';
    btn.onclick = () => { selectedYear = y; renderYearlySummary(); };
    ytabs.appendChild(btn);
  });

  const rows = entries.filter(e=>e.date.startsWith(selectedYear));
  const inc = rows.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
  const exp = rows.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  document.getElementById('y-income').textContent = fmt(inc);
  document.getElementById('y-expense').textContent = fmt(exp);
  const net = inc - exp;
  const ynet = document.getElementById('y-net');
  ynet.textContent = (net>=0?'':'-') + fmt(net);
  ynet.style.color = net >= 0 ? 'var(--green)' : 'var(--accent2)';

  // Monthly trend bar chart
  const monthlyExp = {};
  for (let m=1; m<=12; m++) {
    const key = selectedYear + '-' + String(m).padStart(2,'0');
    monthlyExp[key] = rows.filter(e=>e.date.startsWith(key) && e.type==='expense').reduce((s,e)=>s+e.amount,0);
  }
  const maxMonthVal = Math.max(...Object.values(monthlyExp)) || 1;
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('yearly-month-chart').innerHTML = Object.entries(monthlyExp).map(([key, amt], i) =>
    '<div class="bar-item">' +
    '<div class="bar-top"><span class="bar-label">' + monthNames[i] + '</span><span class="bar-amount">' + (amt>0?fmt(amt):'-') + '</span></div>' +
    '<div class="bar-track"><div class="bar-fill" style="width:' + (amt/maxMonthVal*100).toFixed(1) + '%;background:var(--accent2)"></div></div>' +
    '</div>'
  ).join('');

  // Yearly category chart
  const catMap = {};
  rows.filter(e=>e.type==='expense').forEach(e => catMap[e.category] = (catMap[e.category]||0) + e.amount);
  const sorted = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCatVal = sorted[0]?.[1] || 1;
  document.getElementById('yearly-cat-chart').innerHTML = sorted.length
    ? sorted.map(([cat,amt])=>
        '<div class="bar-item">' +
        '<div class="bar-top"><span class="bar-label">' + (CAT_EMOJI[cat]||'📦') + ' ' + cat + '</span><span class="bar-amount">' + fmt(amt) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + (amt/maxCatVal*100).toFixed(1) + '%;background:' + (CAT_COLORS[cat]||'#888') + '"></div></div>' +
        '</div>').join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0">지출 내역이 없어요</div>';

  // Yearly donut
  renderDonutTo('yearly-donut-svg', 'yearly-donut-legend', sorted, exp);
}

function renderDonut(sorted, total) {
  renderDonutTo('donut-svg', 'donut-legend', sorted, total);
}

function renderDonutTo(svgId, legendId, sorted, total) {
  const svg = document.getElementById(svgId);
  const legend = document.getElementById(legendId);
  if (!total) {
    svg.innerHTML = '<circle cx="60" cy="60" r="40" fill="none" stroke="var(--border)" stroke-width="16"/>';
    legend.innerHTML = '<span style="color:var(--muted);font-size:12px">데이터 없음</span>';
    return;
  }
  const cx=60,cy=60,r=40;
  let start = -Math.PI/2, svgHtml='', legendHtml='';
  sorted.slice(0,6).forEach(([cat,amt]) => {
    const frac = amt/total;
    const angle = frac * 2 * Math.PI;
    const end = start + angle;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    const large = angle > Math.PI ? 1 : 0;
    const color = CAT_COLORS[cat]||'#888';
    svgHtml += '<path d="M' + cx + ' ' + cy + ' L' + x1 + ' ' + y1 + ' A' + r + ' ' + r + ' 0 ' + large + ' 1 ' + x2 + ' ' + y2 + 'Z" fill="' + color + '" opacity="0.85"/>';
    legendHtml += '<div class="legend-item"><span class="legend-dot" style="background:' + color + '"></span><span>' + cat + '</span><span style="margin-left:auto;font-family:var(--mono);font-size:11px">' + (frac*100).toFixed(0) + '%</span></div>';
    start = end;
  });
  svg.innerHTML = svgHtml + '<circle cx="' + cx + '" cy="' + cy + '" r="22" fill="var(--surface)"/>';
  legend.innerHTML = legendHtml;
}

// ---- Init ----
// Set top-month immediately on load
(function() {
  const btn = document.getElementById('top-month');
  if (btn) {
    const now = new Date();
    btn.innerHTML = now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 <span style="font-size:10px;opacity:0.6">▼</span>';
  }
})();
updateStats();
</script>
</body>
